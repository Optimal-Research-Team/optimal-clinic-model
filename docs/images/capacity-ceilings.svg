<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 450" width="720" height="450" role="img" aria-labelledby="t d">
  <title id="t">Maximum longevity panel by booking promise and throughput</title>
  <desc id="d">One core clinician at 32 worked hours per week, longevity only. At 2 patients per hour: 190 members under a 1-week booking promise, 211 under a 2-week promise. At 3 patients per hour: 255 under a 1-week promise, 284 under a 2-week promise.</desc>

  <defs>
    <pattern id="hatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#C9A227"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#8F7318" stroke-width="3"/>
    </pattern>
  </defs>

  <rect x="0.5" y="0.5" width="719" height="449" rx="14" fill="#FFFFFF" stroke="#E6E9ED"/>

  <text x="28" y="34" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" letter-spacing="1.6" fill="#0E7C86" font-weight="700">MAX LONGEVITY PANEL · CAPACITY CEILING</text>
  <text x="28" y="55" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#15181C" font-weight="700">One core clinician · 32 worked hrs/wk · longevity only</text>

  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#5B6470">
    <rect x="28" y="71" width="11" height="11" rx="2" fill="#0E7C86"/>
    <text x="45" y="81">1-week promise · 72% bookable</text>
    <rect x="250" y="71" width="11" height="11" rx="2" fill="url(#hatch)"/>
    <text x="267" y="81">2-week promise · 80% bookable</text>
  </g>

  <g stroke="#E6E9ED" stroke-width="1">
    <line x1="70" y1="350" x2="690" y2="350"/>
    <line x1="70" y1="287.5" x2="690" y2="287.5"/>
    <line x1="70" y1="225" x2="690" y2="225"/>
    <line x1="70" y1="162.5" x2="690" y2="162.5"/>
    <line x1="70" y1="100" x2="690" y2="100"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#8A929C" text-anchor="end">
    <text x="60" y="354">0</text>
    <text x="60" y="291.5">80</text>
    <text x="60" y="229">160</text>
    <text x="60" y="166.5">240</text>
    <text x="60" y="104">320</text>
  </g>

  <rect x="128" y="202" width="90" height="148" rx="4" fill="#0E7C86"/>
  <rect x="232" y="185" width="90" height="165" rx="4" fill="url(#hatch)"/>
  <rect x="438" y="151" width="90" height="199" rx="4" fill="#0E7C86"/>
  <rect x="542" y="128" width="90" height="222" rx="4" fill="url(#hatch)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" font-weight="700" text-anchor="middle">
    <text x="173" y="194" fill="#0E7C86">190</text>
    <text x="277" y="177" fill="#8F7318">211</text>
    <text x="483" y="143" fill="#0E7C86">255</text>
    <text x="587" y="120" fill="#8F7318">284</text>
  </g>

  <g text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="225" y="374" font-size="13.5" fill="#15181C" font-weight="700">2 patients / hr</text>
    <text x="225" y="391" font-size="11.5" fill="#8A929C">30-min visits · 4.54 h/member</text>
    <text x="535" y="374" font-size="13.5" fill="#15181C" font-weight="700">3 patients / hr</text>
    <text x="535" y="391" font-size="11.5" fill="#8A929C">20-min visits · 3.37 h/member</text>
  </g>

  <line x1="28" y1="412" x2="692" y2="412" stroke="#E6E9ED"/>
  <text x="28" y="432" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#8A929C">Throughput (+34.6%) outweighs the access promise (−10%) · panel = faceFillable ÷ longFacePer</text>
</svg>
